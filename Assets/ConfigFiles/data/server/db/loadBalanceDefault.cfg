// Global launcher configuration

// Use ONE Strategy: Sequential, Random, RandomChoice, Search
//  Sequential: balance by round robin assignment to the set of available launchers
//  Random: balance by randomly choosing amongst available launchers
//  RandomChoice: balance by randomly choosing a set of launchers and selecting the one with minimum heuristic
//  Search: balance by walking the set of launchers and selecting the one with minimum heuristic
// If (Strategy == Search) use ONE heuristic flag: Utilization, TotalOccupancy, TypeOccupancy
//  Utilization: a measure of host machine resource utilization (i.e., cpu, etc)
//  TotalOccupancy: total hosted server count
//  TypeOccupancy: total hosted server count of a given type
// Strategy to use in load balancing static/zone mapservers, defaults to Sequential if not specified
BalanceModeZone Search Utilization
// Strategy to use in load balancing mission mapservers, defaults to Search Utilization if not specified
BalanceModeMission Search Utilization

// Factors for determining host utilization metric and per-launch load heuristic
// in MB
MinAvailPhysicalMemory 0
StartingStaticMemBias 600
StartingMissionMemBias 150
// in CPU 0-1
MinAvailPhysicalMemoryBias 0.5
StaticCPUBias 0.0
StartingStaticCPUBias 0.3
StartingMissionCPUBias 0.01
SecondaryRoleBias 0.5
// hard faults in pages/sec
//PagingLoadLow 200
//PagingLoadHigh 30000

// Factors that affect suspensions
// in seconds
TroubleSuspensionTime 1800
// Machine limit due to exposed ports, desired stability, and QoS
MaxMapservers 200
// 0-200+, utilization metric level at which we should suspend launching
MaxHostUtilization 0
// in MB
MinAvailVirtualMemory 0

// No more than MaxMapservers
//MaxMapservers_LowWaterMark 150
// No more than MaxHostUtilization
//MaxHostUtilization_LowWaterMark 200
// No more than MinAvailVirtualMemory
//MinAvailVirtualMemory_LowWaterMark 2500

name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# NOTE: This project is Windows-only and requires Visual Studio 2019 + MSBuild.
# The canonical build is defined in build/vs2019/master.sln and is run via
# Jenkins (see Jenkinsfile) or GitLab CI (see .gitlab-ci.yml) on a Windows runner.
#
# This GitHub Actions workflow is a placeholder to surface CI status on GitHub.
# To enable real CI here, configure a self-hosted Windows runner and adapt the
# Jenkinsfile steps below.
#
# jobs:
#   build:
#     runs-on: self-hosted  # Windows runner with VS2019 + MSBuild
#     steps:
#       - uses: actions/checkout@v4
#         with:
#           submodules: recursive
#       - name: Build
#         shell: cmd
#         run: |
#           call "C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\VC\\Auxiliary\\Build\\vcvars64.bat"
#           msbuild build/vs2019/master.sln /p:Configuration=Release /p:Platform?x64 /m

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check project type
        run: |
          echo "This is a Windows-only MSBuild project."
          echo "Real CI requires a self-hosted Windows runner with Visual Studio 2019."
          echo "See Jenkinsfile or .gitlab-ci.yml for the canonical build pipeline."
          test -f build/vs2019/master.sln && echo "Solution file present." || exit 1

ServerRole
    Host 127.0.0.1
    // HostRange 192.168.1.2 192.168.2.10
    // CityZone, Mission, Monitor, None
    PrimaryRole CityZone Mission
    SecondaryRole None
    // How many Request-BeaconServers to run on this machine.
    RequestBeaconServerCount 1

    Server
        Command "AccountServer.exe"
        AppName "AccountServer"
    End
    Server
        Command "AuctionServer.exe -type hero"
        AppName "AuctionServer"
    End
    Server
        Command "ArenaServer.exe"
        AppName "ArenaServer"
    End
    Server
        Command "MissionServer.exe" 
        AppName "MissionServer"
    End
    Server
        Command "RaidServer.exe"
        AppName "RaidServer"
    End
    Server
        Command "StatServer.exe"
        AppName "StatServer"
    End
    Server
        Command "TurnstileServer.exe"
        AppName "TurnstileServer"
    End
    Server
        Command "ChatServer.exe"
        AppName "ChatServer"
    End
    Server
        Command "MapServer.exe -productionmode -chatservernames 127.0.0.1"
        AppName "MapServer"
    End
    Server
        Command "QueueServer.exe -db 127.0.0.1"
        AppName "QueueServer"
    End
    Server
        Command "MapServer.exe -db 127.0.0.1 -tsr2 -tsrdbconnect"
        AppName "MapServer-TSR"
    End
    Server
        Command "LogServer.exe -logserver"
        AppName "LogServer"
    End
End

// LogLevel values are -2 to 3, increasing in verbosity every level
// -2 -- DISABLED// do not log anything
// -1 -- ALERT// this is so important that someone should be notified
//  0 -- IMPORTANT// only the most important information. Default value
//  1 -- VERBOSE// information that we would like, but has the possibility of spamming the logs with too much data
//  2 -- DEPRECATED// there are old things that are doubtful we should even be logging
//  3 -- DEBUG// lots of information for debugging only

// Crash reports
//SetLogLevel "crashDetails" -2

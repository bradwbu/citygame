// The name of the shard this dbserver manages
ShardName Ouroboros

//// ---------------- ////

// Override auto-detected MapServer IP
AdvertisedIp 127.0.0.1
// Connects DBServer to this AuthServer
AuthServer 127.0.0.1 2104
// Not yet available in Volume 2
BeaconMasterServer 127.0.0.1
// Connects DBServer to this ChatServer
ChatServer 127.0.0.1
// Connects supplementary servers to this DBServer
DbServer 127.0.0.1
// Used to identify an IP address as local and allow it to connect. In a MapServer context it skips this interface and uses the next IP available on the system
LocalIp 127.0.0.1
// Connects DBServer to this LogServer
LogServer 127.0.0.1

//// ---------------- ////

// The locale of the shard
// 0/en: English
// 1/test: Test Locale
// 2/zh: Traditional Chinese
// 3/ko: Korean
// 4/ja: Japanese
// 5/de: German
// 6/fr: French
// 7/es: Spanish
Locale en

//// ---------------- ////

// normal experience multiplier
XPScale 1.0
// normal influence multiplier
InfluenceScale 1.0
// normal prestige multiplier
PrestigeScale 1.0

//// ---------------- ////

// Notes about AE mission types
//
// normal       - ae-scaled rewards, expires,         rewards tickets,        counts as AE mission
// hall of fame - ae-scaled rewards, doesn't expire,  rewards tickets,        counts as AE mission
// features     - normal rewards,    doesn't expire,  rewards tickets,        counts as AE mission
// dev choice   - normal rewards,    doesn't expire,  doesn't reward tickets, counts as normal mission

// AE experience multiplier
AEScale 1.0
// AE influence multiplier
AEInfluenceScale 1.0
// AE prestige multiplier
AEPrestigeScale 1.0

// AE Ticket multiplier
TicketScale 1.0

//// ---------------- ////

// The SQL database type. Only mssql is supported right now
SqlDbProvider mssql
// The name of the dbserver database
SqlDbName cohdb
// An SQL query to initialize the dbserver database for the first time
SqlInit "create database cohdb;"
// Connection string. By default uses Windows mode auth (run under an unprivileged user!)
SqlLogin "Driver={ODBC Driver 17 for SQL Server};Server=localhost;Persist Security Info=False;Trusted_Connection=yes;"
//SqlLogin "Driver={ODBC Driver 17 for SQL Server};Server=localhost;Uid=sa;Pwd=YOUR_DB_PASSWORD;"
// Enable or disable the use of DDL for manipulating the database. This is the master switch for all of the related SQL directives. DDL must be enabled in order to perform many operations for altering the database schema. If a required DDL command is not allowed, the server will exit
SqlAllowDDL 1
// Allow the SqlAddAttributes DDL command
SqlAddAttributes 1
// Allow the SqlAddColumnOrTable DDL command
SqlAddColumnOrTable 1
// Allow the SqlDeleteColumnOrTable DDL command
SqlDeleteColumnOrTable 1
// Allow the SqlRebuildTable DDL command
SqlRebuildTable 1
// Allow the SqlAlterColumn DDL command
SqlAlterColumn 1
// Runs some stored procedure
//ChangeDbOwnerFrom username

//// ---------------- ////

// Enable fake auth. This lets clients log in directly to the dbserver (with any account) instead of going via an authserver
UseFakeAuth 0
// Set the access level of new characters
//DefaultAccessLevel 0
// Set the log file directory. Default is logs inside the game data directory
//LogDir "logs"

// Set the behavior of assertion failures. Multiple modes can be specified if the argument is wrapped in quotes
// Minidump, Fulldump, Exit, NoTimestamp, NoDate, Zip, Ignore
AssertMode Fulldump

// The maximum number of players that can be connected at any time. The maximum value is AUTH_SIZE_MAX (8191)
MaxPlayers 100
// Number of players that the queueserver is allowed to admit per minute. Default is 100
//LoginsPerMinute 100
// DEPRECATED
MinPlayers 0
// Enable or disable the use of the queueserver
UseQueueServer 1
// Put F2P players in the queue if the account server is down
BlockFreePlayersIfNoAccountServer 0
// Let people into the shard even if we would queue them normally
//EnqueueWithAuthLimiter 0
// Disable the statserver -- have the launcher send -nostats to mapservers
NoStats 0
// Set the "registry name". This is used to construct the path to the Windows registry keys
ClientProject coh
// Extra parameters to send to launched mapservers
MapServerParams "-productionmode"
// Possibly perform extra verification checks on containers? Sends -diffdebug to launched mapservers
//DiffDebug 1
// Possibly perform extra verification checks on containers?
//ContainerSizeDebug 1
// Overridden by LogServer
UseLogServer 1
// Enable verbose logging
//LogRelayVerbose 1
// Global max level for NPCs
MaxLevel 50
// NPC max level for blue zones
MaxCoHLevel 50
// NPC max level for red zones
MaxCoVLevel 50
// Number of shared H/V character slots per player, range is 0-48
//MaxDualSlots 12
// Number of days to keep stored backups for. Minimum is 30 days
//BackupDays 30
// Highest level of character that can be moved to offline storage. Default is 35
//OfflineProtectLevel 35
// Number of days before a character is moved to offline storage
//OfflineIdleDays 7
// Sends -completebrokentasks to launched mapservers
//CompleteBrokenTasks 0
// Log when packets are dropped or received out of order
//DroppedPacketLogging 0
// Extra verification on auth packets
//AuthBadPacketReconnect 1
// Don't launch the master beaconserver
DoNotLaunchBeaconMasterServer 0
// Number of beaconrequestservers to launch. Negative values correspond to 2
BeaconRequestServerCount 1
// Number of beaconclients to launch. Minimum 2 (sentry+worker) and maximum [CPU cores] + 1
BeaconClientCount 2
// Don't preload the crash report DLL (CrashRpt.dll)
DoNotPreloadCrashReportDLL 1
// Cache directory for requests made to the beaconservers
BeaconRequestCacheDir "beaconizer"
// Don't launch any beaconclients
DoNotLaunchBeaconClients 0
// Don't launch any TSR mapservers. TSR mapservers preload data to shared memory to make loading other mapservers faster
DoNotLaunchMapServerTSR 0
// Difference in hours between the time on the mapserver and the dbserver
//RaidTimeZoneDelta 0
// Disable on-disk container backups
//DisableContainerBackups 1
// Auction entries for accounts that have not logged in in this many days are not sent
AuctionInvMaxLastLoginDays 60
// Associated with BlockFreePlayersIfNoAccountServer and EnqueueWithAuthLimiter
//AuthnameLimiterEnabled 0
// Characters greater than this access level can bypass the auth limiter
//AuthnameLimiterAccessLevel 20
// A comma delimited list of map keys to not load. 
//BlockedMapKey 0
// A comma delimited list of disabled zone events. 
//DisabledZoneEvents 0
// A list of commands to be executed by the client upon connection
//ClientCommands ""
// The maximum amount of bytes allowed in the send queue to the missionserver
//MissionserverMaxSendQueueSize 1000000
// The maximum amount of bytes allowed in the publish queue to the missionserver
//MissionserverMaxSendQueuePublishSize 500000

// Force user authbits to be set regardless of the state in the database. The format is comma or space-separated authbit names. Possible options (can be combined):
// Con2009Bit5, Con2009Bit4, Con2009Bit3, Con2009Bit2, Con2009Bit1, MagicPack, SupersciencePack, MartialArtsPack,
